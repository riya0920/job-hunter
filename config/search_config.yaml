# ============================================================
# JOB HUNTER - Search Configuration
# ============================================================

# Search queries to run on job aggregators (LinkedIn, Indeed, etc.)
search_queries:
  - "machine learning engineer"
  - "AI engineer"
  - "ML engineer"
  - "applied scientist"
  - "data scientist machine learning"
  - "NLP engineer"
  - "deep learning engineer"
  - "AI/ML engineer"
  - "MLOps engineer"
  - "computer vision engineer"
  # More specific queries for better LinkedIn coverage
  - "LLM engineer"
  - "pytorch engineer"
  - "generative AI engineer"
  - "AI research engineer"
  - "machine learning intern"
  - "AI intern 2026"
  - "ML platform engineer"
  - "NLP data scientist"
  - "conversational AI engineer"
  - "recommendation systems engineer"

# Location filter
location: "United States"
country: "USA"

# Only jobs posted within this many hours
max_hours_old: 24

# Job types to search for
job_types:
  - "fulltime"
  - "internship"

# Maximum results per query per site
results_per_query: 25

