# ---- Additional Free API Sources ----
# These are scraped directly alongside ATS boards
extra_api_sources:
  # Wellfound (AngelList) — startup jobs
  wellfound: true
  # Remotive — remote AI jobs
  remotive: true
  # USAJobs — federal government AI positions
  usajobs: true

# ---- Scoring Configuration ----
scoring:
  # Minimum score (0-100) to include in results
  min_score: 30
  # Minimum score to trigger email notification
  notify_score: 50
  # Weights for combined scoring
  weights:
    keyword: 0.20
    semantic: 0.30
    llm: 0.50

# ---- Experience Level Keywords ----
# Used to filter for entry-level / early career jobs
experience_include_patterns:
  - "entry level"
  - "entry-level"
  - "junior"
  - "new grad"
  - "new graduate"
  - "recent graduate"
  - "early career"
  - "0-2 years"
  - "0-3 years"
  - "1-2 years"
  - "1-3 years"
  - "1+ year"
  - "2+ year"
  - "intern"
  - "internship"
  - "associate"
  - "I "     # Level I
  - " I,"
  - " I -"
  - " L3"
  - " L4"
  - " E3"
  - " E4"
  - "IC1"
  - "IC2"
  - "IC3"

experience_exclude_patterns:
  - "senior"
  - "staff"
  - "principal"
  - "lead"
  - "director"
  - "manager"
  - "head of"
  - "VP "
  - "7+ years"
  - "8+ years"
  - "10+ years"
  - "5-7 years"
  - "5+ years"
  - "PhD required"
  
# ---- H1B Sponsorship ----
h1b:
  # Negative signals (no sponsorship)
  no_sponsor_patterns:
    - "no sponsorship"
    - "not sponsor"
    - "cannot sponsor"
    - "will not sponsor"
    - "won't sponsor"
    - "unable to sponsor"
    - "must be authorized to work"
    - "must be a u.s. citizen"
    - "must be a us citizen"
    - "u.s. citizen or permanent resident"
    - "us citizen or green card"
    - "security clearance required"
    - "active security clearance"
    - "TS/SCI"
    - "without sponsorship"
    - "not eligible for sponsorship"
    - "only open to us citizens"

  # Positive signals (may sponsor)
  sponsor_patterns:
    - "visa sponsorship"
    - "sponsorship available"
    - "will sponsor"
    - "h1b"
    - "h-1b"
    - "immigration sponsorship"
    - "work authorization sponsorship"
    - "open to sponsorship"

